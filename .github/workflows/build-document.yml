# 全科目共通のビルドワークフロー。
# 科目リポジトリ側からは .github/workflows/document.yml が数行で呼ぶだけでよい。
#
# academic-infra が public なのは、ここを private にすると科目リポジトリからの
# checkout に PAT が必要になるため。このリポジトリに秘密情報は置かない。
name: build-document

on:
  workflow_call:
    inputs:
      publish:
        description: main への merge 時のみ true。PR では Drive を触らない。
        type: boolean
        default: false
      draft-chapter:
        description: 指定した章（例 ch01）だけを latest.pdf から切り出し、親フォルダ直下の Drafts フォルダにアップロードする（本番の科目フォルダには触れない）。空なら何もしない。
        type: string
        default: ""
      infra-ref:
        description: academic-infra の参照 ref
        type: string
        default: main
      repo-root:
        description: academic.yml があるディレクトリ（リポジトリ直下からの相対パス）。1リポジトリに複数教材をネストする場合に使う。
        type: string
        default: "."
    secrets:
      GDRIVE_OAUTH_CLIENT_ID:
        required: false
      GDRIVE_OAUTH_CLIENT_SECRET:
        required: false
      GDRIVE_OAUTH_REFRESH_TOKEN:
        required: false
      GDRIVE_PARENT_FOLDER_ID:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    env:
      # step の if: からは step 自身の env が見えないため、ジョブ単位で判定する。
      HAS_DRIVE_CREDENTIALS: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN != '' }}

    steps:
      - name: 科目リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: academic-infra を取得
        uses: actions/checkout@v4
        with:
          repository: yuta-u-tech/academic-infra
          ref: ${{ inputs.infra-ref }}
          path: .academic-infra

      # texlive-full イメージは Alpine ベース。pandoc をディストリのパッケージに
      # 頼ると base image の変更で壊れるため、静的バイナリを固定版で入れる。
      - name: pandoc と Python を用意
        run: |
          set -eux
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache python3 py3-pip git curl tar
          else
            apt-get update && apt-get install -y python3 python3-pip git curl tar
          fi
          PANDOC_VERSION=3.1.11
          curl -fsSL -o /tmp/pandoc.tar.gz \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/pandoc.tar.gz -C /tmp
          install -m 0755 "/tmp/pandoc-${PANDOC_VERSION}/bin/pandoc" /usr/local/bin/pandoc
          pandoc --version | head -1

      - name: Python 依存を導入
        run: |
          python3 -m pip install --break-system-packages -r .academic-infra/requirements.txt || \
            python3 -m pip install -r .academic-infra/requirements.txt

      - name: 成果物をビルド
        run: |
          python3 .academic-infra/scripts/build_artifacts.py \
            --repo-root "${{ inputs.repo-root }}" \
            --repository "${GITHUB_REPOSITORY}"

      - name: Artifact 名を決定
        id: artifact-name
        run: |
          # repo-root "." はレガシー（ネストなし）科目との互換用にそのまま "document" にする。
          # ネストしている場合はフォルダ名をサニタイズしてartifact名の衝突を避ける。
          if [ "${{ inputs.repo-root }}" = "." ]; then
            echo "name=document-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            SLUG="$(echo "${{ inputs.repo-root }}" | tr -c 'a-zA-Z0-9_.-' '-')"
            echo "name=document-${SLUG}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Artifact に保存
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            ${{ inputs.repo-root }}/dist/latest.pdf
            ${{ inputs.repo-root }}/dist/latest.md
            ${{ inputs.repo-root }}/dist/review-manifest.json
            ${{ inputs.repo-root }}/dist/sections/
            ${{ inputs.repo-root }}/dist/build.log
          retention-days: 30
          if-no-files-found: error

      # Drive は main への merge 後だけ更新する。PR ごとに同期すると、
      # 未マージの内容が閲覧者のナレッジベースに混ざる。
      - name: Google Drive を更新
        if: ${{ inputs.publish && env.HAS_DRIVE_CREDENTIALS == 'true' }}
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_PARENT_FOLDER_ID: ${{ secrets.GDRIVE_PARENT_FOLDER_ID }}
        run: |
          FOLDER_NAME="$(python3 -c "import yaml; print(yaml.safe_load(open('${{ inputs.repo-root }}/academic.yml'))['drive_folder_name'])")"
          python3 .academic-infra/scripts/update_drive.py \
            --dist "${{ inputs.repo-root }}/dist" \
            --folder-name "${FOLDER_NAME}"

      # レビュー用の下書き。親フォルダ (Academic Materials) 直下の Drafts に
      # 該当章だけを切り出してアップロードし、本番の latest.pdf/sections には触れない。
      - name: Google Drive の Drafts へ章単位でアップロード
        if: ${{ !inputs.publish && inputs['draft-chapter'] != '' && env.HAS_DRIVE_CREDENTIALS == 'true' }}
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_PARENT_FOLDER_ID: ${{ secrets.GDRIVE_PARENT_FOLDER_ID }}
        run: |
          FOLDER_NAME="$(python3 -c "import yaml; print(yaml.safe_load(open('${{ inputs.repo-root }}/academic.yml'))['drive_folder_name'])")"
          python3 .academic-infra/scripts/update_drive.py \
            --dist "${{ inputs.repo-root }}/dist" \
            --folder-name "${FOLDER_NAME}" \
            --draft-chapter "${{ inputs['draft-chapter'] }}"

      - name: Drive 認証が未設定であることを通知
        if: ${{ (inputs.publish || inputs['draft-chapter'] != '') && env.HAS_DRIVE_CREDENTIALS != 'true' }}
        run: |
          echo "::notice::GDRIVE_OAUTH_REFRESH_TOKEN が未設定のため Drive 同期をスキップしました。成果物は Artifact から取得できます。"
